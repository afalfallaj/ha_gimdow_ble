name: Release Please

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please (stable)
        id: release-stable
        if: github.ref == 'refs/heads/main'
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run release-please (pre-release)
        id: release-prerelease
        if: github.ref == 'refs/heads/dev'
        uses: googleapis/release-please-action@v5
        with:
          config-file: .github/release-please-config-dev.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      # After a release is created, replace the auto-generated body with the
      # matching version section from our manually-maintained CHANGELOG.md.
      - uses: actions/checkout@v4
        if: steps.release-stable.outputs.release_created || steps.release-prerelease.outputs.release_created

      - name: Sync release notes from CHANGELOG.md
        if: steps.release-stable.outputs.release_created || steps.release-prerelease.outputs.release_created
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-stable.outputs.tag_name || steps.release-prerelease.outputs.tag_name }}
        run: |
          VER="${TAG#v}"
          awk -v ver="$VER" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md | gh release edit "$TAG" --notes-file -
